plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    maven {
        name = "Xaero's Mods"
        url = "https://maven.xaero.realmofterrafirma.com"
    }
    maven {
        name = "TerraformersMC"
        url = "https://maven.terraformersmc.com/releases/"
    }
    maven {
        name = "JitPack"
        url = "https://jitpack.io"
    }
    mavenCentral()
}

dependencies {
    // Minecraft & Fabric
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    // Xaero's Minimap
    modCompileOnly("xaero.minimap:XaerosMinimap-Fabric:${project.xaero_minimap_version}") {
        transitive = false
    }

    // Xaero's World Map
    modCompileOnly("xaero.worldmap:XaerosWorldMap-Fabric:${project.xaero_worldmap_version}") {
        transitive = false
    }

    // VulkanMod (compile-only, optional at runtime)
    modCompileOnly("com.github.xCollateral:VulkanMod:${project.vulkanmod_version}") {
        transitive = false
    }
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 25
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.archives_base_name}" }
    }
}
