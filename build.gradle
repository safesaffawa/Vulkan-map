plugins {
    id 'net.fabricmc.fabric-loom' version '1.16.0-alpha.5'
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    maven {
        name = "Xaero's Mods"
        url = "https://maven.xaero.realmofterrafirma.com"
    }
    maven {
        name = "TerraformersMC"
        url = "https://maven.terraformersmc.com/releases/"
    }
    maven {
        name = "JitPack"
        url = "https://jitpack.io"
    }
    mavenCentral()
}

dependencies {
    // 26.1 不需要 mappings 行，直接引用 minecraft
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    
    // 注意：modImplementation 改为 implementation（26.1 官方要求）
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    // Xaero's Minimap
    compileOnly "xaero.minimap:XaerosMinimap-Fabric:${project.xaero_minimap_version}"
    
    // Xaero's World Map
    compileOnly "xaero.worldmap:XaerosWorldMap-Fabric:${project.xaero_worldmap_version}"
    
    // VulkanMod
    compileOnly "com.github.xCollateral:VulkanMod:${project.vulkanmod_version}"
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 25
}

java {
    // 使用 toolchain 确保 Java 25 编译
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    withSourcesJar()
}

// 26.1 中 remapJar 已被 jar 替代
jar {
    from("LICENSE") {
        rename { "${it}_${project.archives_base_name}" }
    }
}
